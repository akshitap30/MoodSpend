name: moodspend
description: "A behaviour-change app at the intersection of emotional intelligence and personal finance."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.3.0

  # Charts
  fl_chart: ^0.68.0

  # Local DB / Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Fonts
  google_fonts: ^6.2.1

  # Sharing
  share_plus: ^9.0.0

  # Formatting
  intl: ^0.19.0

  # SVG
  flutter_svg: ^2.0.10+1

  # Icons
  cupertino_icons: ^1.0.6

  # Path Provider
  path_provider: ^2.1.3

  # UUID
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
